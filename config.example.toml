[hub]
base_url = "http://192.168.1.100:8787"
default_workflow = "Synra Assistant"
favorite_workflows = ["Synra Assistant"]
timeout_seconds = 4.0
assistant_timeout_seconds = 45.0

[device]
name = "NodeSpark Synra"
checkin_interval_seconds = 60
command_poll_interval_seconds = 2

[server]
host = "0.0.0.0"
port = 8788
open_browser = false

[tts]
# auto uses Voicebox when reachable, then ElevenLabs when ELEVENLABS_API_KEY is
# set, then Kokoro when installed, then falls back to the browser voice.
provider = "auto"
max_text_chars = 900
voicebox_enabled = true
voicebox_base_url = "http://127.0.0.1:17493"
voicebox_timeout_seconds = 90.0
voicebox_model_size = "0.6B"
voicebox_auto_create_profiles = true
elevenlabs_voice_id = "EXAVITQu4vr4xnSDxMaL"
elevenlabs_model_id = "eleven_multilingual_v2"
elevenlabs_stability = 0.42
elevenlabs_similarity_boost = 0.82
elevenlabs_style = 0.35
kokoro_voice = "af_heart"
kokoro_lang_code = "a"

[local_ai]
enabled = true
provider = "ollama"
base_url = "http://127.0.0.1:11434"
model = "qwen2.5:1.5b"
vision_model = "moondream"
timeout_seconds = 20.0
vision_timeout_seconds = 45.0
route_general_locally = true
route_short_inputs_locally = true

[avatar]
name = "Synra"
personality = "Confident, warm, playful, and workflow-smart."
accent_primary = "#4cc9ff"
accent_secondary = "#9b5cff"
accent_success = "#40f0a0"
accent_warning = "#ffd166"
accent_error = "#ff4d6d"
